name: Build workflow
on:
 push:
  branches:
    - main
 pull_request:
  branches:
    - main 
permissions:
 contents: read
jobs:
  Build:
   runs-on: ubuntu-latest
   steps:
    - name: Code checkout
      uses: actions/checkout@v5

    - name: maven build
      run: mvn install
    - name: upload artifacts
      uses: actions/upload-artifact@v4
      with:
       name: vprofile-app
       path: target/*.war
    - name: notify if build is fail
      if: failure()
      run: echo "Build job is failed! Please check logs"
     
  Testing:
   runs-on: ubuntu-latest
   needs: Build
   steps:
     - name: code checkout
       uses: actions/checkout@v5
     - name: Run tests on main branch
       if: github.ref == 'refs/head/main'
       run: mvn test
     - name: Checkstyle
       if: github.ref == 'refs/head/main'
       run: mvn checkstyle:checkstyle
     - name: Run test on other branch
       if: github.ref != 'refs/head/main'
       run: echo "skipping unit test and code analysis" 
  Securityscan:
   runs-on: ubuntu-latest
   needs: Testing
   steps:
    - name: Code checkout
      uses: actions/checkout@v5
      with:
       fetch-depth: 0

    - name: Run Trivy file system scan
      uses: aquasecurity/trivy-action@0.28.0
      with:
       scan-type: fs
       scan-ref: .
       exit-code: 0
       vuln-type: os,library
       output: trivy-results.json

    - name: upload built scan reports
      uses: actions/upload-artifact@v4
      with:
       name: vprofile-app-report
       path: trivy-results.json




name: Build workflow
on:
 push:
  branches:
    - main
 pull_request:
  branches:
    - main 
permissions:
 contents: read
jobs:
  Build:
   runs-on: ubuntu-latest
   steps:
    - name: Code checkout
      uses: actions/checkout@v5

    - name: maven build
      run: mvn install
    - name: upload artifacts
      uses: actions/upload-artifact@v4
      with:
       name: vprofile-app
       path: target/*.war
    - name: notify if build is fail
      if: failure()
      run: echo "Build job is failed! Please check logs"
     
  Testing:
   runs-on: ubuntu-latest
   needs: Build
   steps:
     - name: code checkout
       uses: actions/checkout@v5
     - name: Run tests on main branch
       if: github.ref == 'refs/head/main'
       run: mvn test
     - name: Checkstyle
       if: github.ref == 'refs/head/main'
       run: mvn checkstyle:checkstyle
     - name: Run test on other branch
       if: github.ref !== 'refs/head/main'
       run: echo "skipping unit test and code analysis" 




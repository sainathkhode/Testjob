name: Build workflow
on:
 #push:
  #branches:
   # - main
  pull_request:
   branches:
     - main 
jobs:
  Build:
   runs-on: ubuntu-latest
   steps:
     - name: Code checkout
       uses: actions/checkout@v5

     - name: maven build
       run: mvn install
  Testing:
   runs-on: ubuntu-latest
   needs: Build
   steps:
     - name: code checkout
       uses: actions/checkout@v5
     - name: Run tests on main branch
       run: mvn test
     - name: Checkstyle
       run: mvn checkstyle:checkstyle



